name: Daily Collect
on:
  schedule:
    - cron: "30 21 * * 1-5"   # 21:30 UTC ≈ after US close (4:30/5:30pm ET w/ DST)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install yfinance pandas requests
      - run: python collect.py
      - name: Commit data
        run: |
          git config user.name "collector-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data/
          git diff --cached --quiet || git commit -m "data: daily collect $(date -u +%F)"
          git push
